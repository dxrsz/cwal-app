<!doctype html>
<!--
  Inline style on <html>/<body> sets the canvas color at HTML parse time,
  before any external CSS loads or any JS runs. Without this we'd briefly
  see the UA canvas color resolved from `color-scheme: dark` (~#1b1b1b in
  Chromium) between Tauri's clear color and app.css's `bg-background`
  taking over. Matches the oklch(0.141 0.005 285.823) token used by
  .dark in app.css.
-->
<html lang="en" style="background-color: #09090b; color-scheme: dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tauri + SvelteKit + Typescript App</title>
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="dark"
    style="background-color: #09090b"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
  <script type="text/javascript">
    // enable below only in dev mode
    //document.addEventListener("DOMContentLoaded", () => {
    //  document.addEventListener("contextmenu", (e) => {
    //    e.preventDefault();
    //  });
    //});
  </script>
</html>
